# CI + auto-publish on master.
#
# Release = bump version in package.json, merge to master. Workflow runs
# tests, publishes via OIDC trusted publishing (no NPM_TOKEN), tags, releases.
#
# One-time maintainer setup on https://www.npmjs.com/package/opencode-ralph-loop/access
#   Trusted Publisher → GitHub Actions
#     org `charfeng1`, repo `opencode-ralph-loop`, workflow `release.yml`, env blank
#   Recommended: Publishing access → "Require 2FA and disallow tokens"

name: CI & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel superseded PR runs on the same branch (but never master).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Plugin runtime supports Node >=18 (see package.json#engines), but
        # vitest 4 needs Node >=20.12 for its `node:util.styleText` import.
        # We test on the versions our dev tooling supports.
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Tests
        run: npm test

  # Publishes to npm when package.json#version moves ahead of the published
  # version on the registry. Runs only on master pushes (and manual dispatches),
  # never on PRs. Uses OIDC trusted publishing — no NPM_TOKEN secret needed.
  # See CONTRIBUTING.md for the one-time npmjs.com setup.
  publish:
    name: Publish to npm
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for pushing the version tag + creating the GitHub release
      id-token: write   # for OIDC trusted publishing + provenance attestation
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `gh release create --generate-notes` can find the
          # previous tag to compute changes against.
          fetch-depth: 0

      # Node 24 ships npm 11.x (>= 11.5.1 needed for trusted publishing).
      # Do NOT set registry-url here — that makes setup-node write an
      # .npmrc with `_authToken=${NODE_AUTH_TOKEN}`, and with no
      # NODE_AUTH_TOKEN secret npm sends an empty bearer (→ 404) instead
      # of falling through to OIDC. With no .npmrc auth config, npm picks
      # up the GitHub OIDC token automatically.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Decode the GitHub OIDC token to verify the claims that will be sent
      # to npmjs.com. If the trusted publisher config on npm doesn't match
      # exactly (repo, workflow filename, environment), the auth will fail.
      - name: Verify OIDC claims sent to npm
        run: |
          TOKEN=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org")
          JWT=$(echo "$TOKEN" | jq -r .value)
          PAYLOAD=$(echo "$JWT" | cut -d. -f2 | tr '_-' '/+' | base64 -d 2>/dev/null || true)
          echo "OIDC claims being sent to npm:"
          echo "$PAYLOAD" | jq '{repository, workflow, workflow_ref, ref, environment, sub, aud}' || echo "$PAYLOAD"

      - name: Detect version change
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          NPM=$(npm view opencode-ralph-loop version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          # Publish only when local is strictly greater than npm latest.
          # `sort -V` gives semver-correct ordering; the higher version sorts last.
          HIGHER=$(printf '%s\n%s\n' "$LOCAL" "$NPM" | sort -V | tail -n1)
          if [ "$LOCAL" = "$HIGHER" ] && [ "$LOCAL" != "$NPM" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Publishing $LOCAL (current latest on npm: $NPM)"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping publish: local=$LOCAL, npm=$NPM"
          fi

      # Show .npmrc state so we can rule out lingering auth config that
      # would prevent npm from falling through to OIDC.
      - name: Show .npmrc state
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "--- ~/.npmrc ---"
          cat ~/.npmrc 2>/dev/null | sed 's/_authToken=.*/_authToken=<MASKED>/' || echo "(no ~/.npmrc)"
          echo "--- ./.npmrc ---"
          cat ./.npmrc 2>/dev/null | sed 's/_authToken=.*/_authToken=<MASKED>/' || echo "(no ./.npmrc)"
          echo "--- npm config (auth) ---"
          npm config list 2>&1 | grep -iE "registry|auth|provenance" || true

      - name: Publish to npm (verbose, OIDC)
        if: steps.check.outputs.changed == 'true'
        run: npm publish --provenance --access public --loglevel=verbose

      - name: Tag and create GitHub release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NUMBER: ${{ steps.check.outputs.local }}
        run: |
          VERSION="v${VERSION_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes
